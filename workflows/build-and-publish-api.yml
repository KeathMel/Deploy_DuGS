name: build-and-publish-api

# Auto-runs on every push that touches the backend, and lets you trigger it
# by hand from the Actions tab too. No secrets to set up — GITHUB_TOKEN is
# provided automatically by GitHub Actions and is enough to publish to
# GitHub Container Registry (ghcr.io).
"on":
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-and-publish-api.yml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/dugs-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
